<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Background Radial Glow to ensure contrast on light backgrounds if needed -->
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#0b1026" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#050510" stop-opacity="0.95" />
    </radialGradient>
    
    <!-- Mood Nebula/Palette Gradient - space-aurora to space-nebula to space-stardust -->
    <linearGradient id="nebulaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#e9d5ff" />
    </linearGradient>
    
    <!-- Glow filter for elements -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Star Glow filter (stronger) -->
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Deep space background disk -->
  <circle cx="50" cy="50" r="46" fill="url(#spaceGradient)" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.2" />

  <!-- 1. The Swirling Nebula (representing Mood Palette) -->
  <path d="M 32 40 C 25 20, 60 15, 75 35 C 90 55, 65 82, 45 78 C 25 74, 22 55, 32 40 Z" 
        fill="url(#nebulaGradient)" 
        opacity="0.45" 
        filter="url(#glow)" />
        
  <path d="M 42 28 C 62 18, 80 38, 72 62 C 64 86, 32 78, 26 55 C 20 32, 28 35, 42 28 Z" 
        fill="url(#nebulaGradient)" 
        opacity="0.25" 
        filter="url(#glow)" 
        transform="rotate(45 50 50)" />

  <!-- 2. Camera Iris/Aperture Lines (representing Gallery / Picture of the Day) -->
  <g stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.4" fill="none">
    <circle cx="50" cy="50" r="38" stroke-dasharray="2 3" />
    <line x1="28" y1="28" x2="68" y2="18" />
    <line x1="68" y1="18" x2="82" y2="50" />
    <line x1="82" y1="50" x2="62" y2="82" />
    <line x1="62" y1="82" x2="22" y2="72" />
    <line x1="22" y1="72" x2="18" y2="38" />
    <line x1="18" y1="38" x2="28" y2="28" />
  </g>

  <!-- 3. Concentric Orbital Rings (representing Astronomy / Space Engine) -->
  <ellipse cx="50" cy="50" rx="34" ry="14" 
           fill="none" 
           stroke="#e9d5ff" 
           stroke-width="0.75" 
           stroke-opacity="0.5" 
           transform="rotate(-25 50 50)" />
           
  <ellipse cx="50" cy="50" rx="26" ry="10" 
           fill="none" 
           stroke="#22d3ee" 
           stroke-width="1" 
           stroke-opacity="0.7" 
           transform="rotate(35 50 50)" />

  <!-- Planet on orbit -->
  <circle cx="28" cy="35" r="2" fill="#22d3ee" filter="url(#glow)" />
  <circle cx="68" cy="62" r="1.2" fill="#e9d5ff" />

  <!-- 4. Background Stardust -->
  <circle cx="26" cy="22" r="0.6" fill="#fff" opacity="0.8" />
  <circle cx="74" cy="24" r="0.8" fill="#fff" opacity="0.9" filter="url(#glow)" />
  <circle cx="78" cy="72" r="0.7" fill="#fff" opacity="0.7" />
  <circle cx="22" cy="74" r="1" fill="#fff" opacity="0.6" />

  <!-- 5. Central Glowing Star (representing the APOD Star / Cosmic Focus) -->
  <circle cx="50" cy="50" r="7" fill="#e9d5ff" opacity="0.25" filter="url(#starGlow)" />
  
  <path d="M 50 20 Q 50 50 20 50 Q 50 50 50 80 Q 50 50 80 50 Q 50 50 50 20 Z" 
        fill="#ffffff" 
        filter="url(#starGlow)" />
        
  <circle cx="50" cy="50" r="2.5" fill="#ffffff" />
  
  <!-- Star diagonal elements -->
  <path d="M 50 38 L 50 62 M 38 50 L 62 50" stroke="#ffffff" stroke-width="1" opacity="0.7" />
  <path d="M 43 43 L 57 57 M 43 57 L 57 43" stroke="#ffffff" stroke-width="0.6" opacity="0.5" />
</svg>
